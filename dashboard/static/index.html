<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Triage — OT threat console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05080d; --panel:rgba(13,20,32,.72); --line:rgba(55,225,214,.16); --line2:#16202e;
    --ink:#d3e0ee; --dim:#6b7f96; --faint:#3b4a5e;
    --cyan:#37e1d6; --amber:#ffb454; --red:#ff5740; --ok:#39d98a; --slate:#8aa0b8; --violet:#b48cff;
    --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
    --disp:'Chakra Petch',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--mono);overflow:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      linear-gradient(rgba(55,225,214,.035) 1px,transparent 1px) 0 0/100% 34px,
      linear-gradient(90deg,rgba(55,225,214,.035) 1px,transparent 1px) 0 0/34px 100%,
      radial-gradient(ellipse at 50% -10%, rgba(30,60,80,.5), transparent 60%);}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:40;opacity:.5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.18) 2px 3px);
    mix-blend-mode:multiply;}
  .scanbeam{position:fixed;left:0;right:0;height:120px;z-index:41;pointer-events:none;
    background:linear-gradient(180deg,transparent,rgba(55,225,214,.05),transparent);
    animation:scan 7s linear infinite}
  @keyframes scan{0%{top:-120px}100%{top:100%}}

  body{display:grid;grid-template-rows:auto 1fr auto;height:100vh;position:relative;z-index:1}

  header{display:flex;align-items:center;gap:16px;padding:10px 18px;
    background:linear-gradient(180deg,rgba(12,18,29,.9),rgba(8,12,20,.8));border-bottom:1px solid var(--line)}
  .mark{font-family:var(--disp);font-weight:700;font-size:19px;letter-spacing:5px;color:#fff;
    display:flex;align-items:center;gap:10px;text-shadow:0 0 18px rgba(55,225,214,.5)}
  .mark .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);animation:blink 1.5s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .sys{font-size:10px;letter-spacing:1px;color:var(--dim)}
  .sys b{color:var(--cyan)}
  .threat{margin-left:6px;font-family:var(--disp);font-size:11px;letter-spacing:2px;padding:5px 12px;border-radius:3px;
    text-transform:uppercase;border:1px solid var(--red);color:var(--red);background:rgba(255,87,64,.12);
    animation:threatpulse 1.4s infinite}
  @keyframes threatpulse{0%,100%{box-shadow:0 0 0 rgba(255,87,64,0)}50%{box-shadow:0 0 16px rgba(255,87,64,.55)}}
  .hspace{margin-left:auto;display:flex;align-items:center;gap:18px}
  .live{font-size:10px;letter-spacing:1.5px;color:var(--ok);display:flex;align-items:center;gap:6px}
  .live i{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok);animation:blink 1.2s infinite}
  .clock{font-family:var(--disp);font-size:15px;letter-spacing:2px;color:var(--ink)}

  main{display:grid;grid-template-columns:236px 1fr 336px;gap:10px;padding:10px;min-height:0}
  .rail{display:flex;flex-direction:column;gap:10px;min-height:0}
  .center{display:grid;grid-template-rows:1fr 128px;gap:10px;min-height:0}

  .panel{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:4px;
    padding:9px 11px;min-height:0;display:flex;flex-direction:column}
  .panel::before{content:"";position:absolute;top:-1px;left:-1px;width:11px;height:11px;
    border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);opacity:.7}
  .panel::after{content:"";position:absolute;bottom:-1px;right:-1px;width:11px;height:11px;
    border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);opacity:.7}
  .ph{font-family:var(--disp);font-size:9.5px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;
    margin-bottom:8px;display:flex;align-items:center;gap:7px}
  .ph::before{content:"▐";color:var(--cyan)}

  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .kpi{border:1px solid var(--line2);border-radius:3px;padding:8px 9px;background:rgba(8,13,20,.5);position:relative;overflow:hidden}
  .kpi .v{font-family:var(--disp);font-size:26px;font-weight:700;line-height:1;color:#fff}
  .kpi .k{font-size:8px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;margin-top:4px}
  .kpi.red .v{color:var(--red);text-shadow:0 0 14px rgba(255,87,64,.5)}
  .kpi.amber .v{color:var(--amber)} .kpi.cyan .v{color:var(--cyan)}

  .donutwrap{display:flex;align-items:center;gap:12px}
  .donut{position:relative;width:104px;height:104px;flex:0 0 auto}
  .donut .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .donut .mid .n{font-family:var(--disp);font-size:24px;font-weight:700;color:var(--red);line-height:1;text-shadow:0 0 12px rgba(255,87,64,.5)}
  .donut .mid .l{font-size:7.5px;letter-spacing:1px;color:var(--dim);text-transform:uppercase}
  .dlegend{flex:1;display:flex;flex-direction:column;gap:5px;font-size:9.5px}
  .dlegend .row{display:flex;align-items:center;gap:6px;color:var(--dim)}
  .dlegend .row i{width:8px;height:8px;border-radius:2px}
  .dlegend .row b{margin-left:auto;color:var(--ink);font-family:var(--disp)}

  .hbars{display:flex;flex-direction:column;gap:7px}
  .hbar{font-size:9.5px}
  .hbar .t{display:flex;justify-content:space-between;color:var(--dim);margin-bottom:2px}
  .hbar .t b{color:var(--ink)}
  .hbar .track{height:6px;background:#0b1521;border-radius:3px;overflow:hidden}
  .hbar .track>span{display:block;height:100%;width:0;border-radius:3px;
    background:linear-gradient(90deg,#1f6a66,var(--cyan));transition:width 1s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 8px rgba(55,225,214,.4)}

  .qwrap{flex:1;position:relative;min-height:0;overflow:hidden}
  svg{width:100%;height:100%;display:block}
  .qbeam{position:absolute;top:0;bottom:0;width:80px;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(55,225,214,.10),transparent);animation:qscan 4.5s linear infinite}
  @keyframes qscan{0%{left:-80px}100%{left:100%}}
  .tip{position:absolute;pointer-events:none;background:#0a1626;border:1px solid var(--line);border-radius:5px;
    padding:8px 10px;font-size:10px;color:var(--ink);opacity:0;transition:opacity .12s;max-width:230px;z-index:5;
    box-shadow:0 8px 24px rgba(0,0,0,.6)}
  .tip .t{font-family:var(--disp);color:#fff;margin-bottom:3px}
  .tip .d{color:var(--dim);line-height:1.4}

  .exbars{display:flex;align-items:flex-end;gap:10px;flex:1;padding-top:4px}
  .ex{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .ex .bar{width:100%;max-width:54px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--cyan),#1f6a66);
    box-shadow:0 0 10px rgba(55,225,214,.35);transition:height .9s cubic-bezier(.2,.8,.2,1);min-height:2px}
  .ex .bar.hot{background:linear-gradient(180deg,var(--red),#7a1f16);box-shadow:0 0 12px rgba(255,87,64,.5)}
  .ex .n{font-family:var(--disp);font-size:12px;color:var(--ink);margin-bottom:3px}
  .ex .l{font-size:8px;color:var(--dim);margin-top:5px;letter-spacing:.5px}

  #queue{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line) transparent;margin:-2px -4px 0}
  .qitem{padding:8px 8px;border-bottom:1px solid #0d1421;position:relative}
  .qitem .top{display:flex;align-items:center;gap:7px}
  .qitem .rk{font-family:var(--disp);font-size:11px;color:var(--faint);width:20px}
  .qitem .cve{font-size:10.5px;color:var(--ink)}
  .qitem .kev{font-family:var(--disp);font-size:7.5px;letter-spacing:.6px;padding:1px 5px;border-radius:2px;text-transform:uppercase;
    background:rgba(255,87,64,.16);color:var(--red);border:1px solid var(--red);animation:threatpulse 1.6s infinite}
  .qitem .p{margin-left:auto;font-family:var(--disp);font-size:14px;font-weight:700}
  .qitem .m{font-size:8.5px;color:var(--dim);margin:3px 0 4px 27px}
  .qitem .m b{color:var(--slate)}
  .qitem .bar{height:4px;border-radius:2px;background:#0b1521;overflow:hidden;margin-left:27px}
  .qitem .bar>span{display:block;height:100%;width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .b-fix_first .p{color:var(--red)} .b-fix_first .bar>span{background:linear-gradient(90deg,#7a1f16,var(--red));box-shadow:0 0 8px rgba(255,87,64,.5)}
  .b-schedule .p{color:var(--amber)} .b-schedule .bar>span{background:linear-gradient(90deg,#7a561f,var(--amber))}
  .b-monitor .p{color:var(--cyan)} .b-monitor .bar>span{background:linear-gradient(90deg,#1f6a66,var(--cyan))}
  .b-accept .p{color:var(--slate)} .b-accept .bar>span{background:#33414f}

  .ticker{border-top:1px solid var(--line);background:rgba(8,12,20,.9);overflow:hidden;white-space:nowrap;
    padding:6px 0;font-size:10px;letter-spacing:.5px}
  .ticker .track{display:inline-block;animation:marq 42s linear infinite}
  .ticker .seg{margin:0 26px;color:var(--dim)}
  .ticker .seg b{color:var(--red)} .ticker .seg .cve{color:var(--cyan)}
  @keyframes marq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  ::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
  @media (max-width:980px){ main{grid-template-columns:1fr} .rail,aside{display:none} }
</style>
</head>
<body>
  <div class="scanbeam"></div>

  <header>
    <div class="mark"><span class="dot"></span>TRIAGE</div>
    <div class="threat" id="threat">THREAT: —</div>
    <div class="sys">NODE <b id="src">—</b> · DB <b>OT-VULN</b> · MODE <b>OFFLINE</b></div>
    <div class="hspace">
      <div class="live"><i></i>LIVE</div>
      <div class="clock" id="clock">00:00:00</div>
    </div>
  </header>

  <main>
    <div class="rail">
      <div class="panel" style="flex:0 0 auto">
        <div class="ph">Threat metrics</div>
        <div class="kpis">
          <div class="kpi red"><div class="v" id="kKev" data-t="0">0</div><div class="k">Actively exploited</div></div>
          <div class="kpi red"><div class="v" id="kFix" data-t="0">0</div><div class="k">Fix first</div></div>
          <div class="kpi cyan"><div class="v" id="kTot" data-t="0">0</div><div class="k">Vuln instances</div></div>
          <div class="kpi amber"><div class="v" id="kAss" data-t="0">0</div><div class="k">Assets hit</div></div>
        </div>
      </div>
      <div class="panel" style="flex:0 0 auto">
        <div class="ph">Remediation mix</div>
        <div class="donutwrap">
          <div class="donut"><svg id="donut" viewBox="0 0 120 120"></svg>
            <div class="mid"><div class="n" id="donutN">0</div><div class="l">fix first</div></div></div>
          <div class="dlegend" id="dlegend"></div>
        </div>
      </div>
      <div class="panel" style="flex:1 1 auto;overflow:hidden">
        <div class="ph">Top exposed vendors</div>
        <div class="hbars" id="vbars"></div>
      </div>
    </div>

    <div class="center">
      <div class="panel">
        <div class="ph">Risk quadrant · exploit likelihood × severity</div>
        <div class="qwrap">
          <div class="qbeam"></div>
          <svg id="quad" viewBox="0 0 900 500" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="tip" id="tip"></div>
        </div>
      </div>
      <div class="panel">
        <div class="ph">Exposure by Purdue level</div>
        <div class="exbars" id="exbars"></div>
      </div>
    </div>

    <aside class="panel" style="padding:0">
      <div class="ph" style="padding:10px 12px 8px;margin:0;border-bottom:1px solid var(--line)">▲ Priority queue — fix first</div>
      <div id="queue"></div>
    </aside>
  </main>

  <div class="ticker"><div class="track" id="ticker"></div></div>

<script>
const BAND_COLOR={fix_first:"#ff5740",schedule:"#ffb454",monitor:"#37e1d6",accept:"#8aa0b8"};
const M={l:52,r:24,t:20,b:40}, VW=900, VH=500;
const xS=e=>{const t=Math.sqrt(Math.max(0,Math.min(100,e))/100);return M.l+t*(VW-M.l-M.r);};
const yS=c=>VH-M.b-(Math.max(0,Math.min(10,c))/10)*(VH-M.t-M.b);
let DATA=null;

function clock(){const d=new Date();document.getElementById('clock').textContent=d.toTimeString().slice(0,8);}
setInterval(clock,1000);clock();

function animCount(el){const t=+el.dataset.t;let s=0;const st=Math.max(1,Math.ceil(t/28));
  const iv=setInterval(()=>{s+=st;if(s>=t){s=t;clearInterval(iv);}el.textContent=s;},26);}

async function load(){
  DATA=await (await fetch('/api/data')).json();
  const s=DATA.summary||{},m=DATA.meta||{},bands=s.bands||{};
  document.getElementById('src').textContent=(m.inventory||'—').split('/').pop();
  const fix=bands.fix_first||0;
  const lvl = fix>=10?'CRITICAL':fix>=4?'ELEVATED':fix>0?'GUARDED':'LOW';
  document.getElementById('threat').textContent='THREAT: '+lvl;
  document.getElementById('kKev').dataset.t=s.kev||0;
  document.getElementById('kFix').dataset.t=fix;
  document.getElementById('kTot').dataset.t=s.total||0;
  document.getElementById('kAss').dataset.t=s.assets_affected||0;
  document.querySelectorAll('.kpi .v').forEach(animCount);
  document.getElementById('donutN').textContent=fix;
  renderDonut(bands); renderVendors(); renderQuad(); renderExposure(); renderQueue(); renderTicker();
}

function renderDonut(bands){
  const order=[['fix_first',BAND_COLOR.fix_first],['schedule',BAND_COLOR.schedule],
               ['monitor',BAND_COLOR.monitor],['accept',BAND_COLOR.accept]];
  const total=order.reduce((a,[k])=>a+(bands[k]||0),0)||1;
  let off=0, s='', R=48, C=2*Math.PI*R;
  for(const [k,col] of order){
    const frac=(bands[k]||0)/total; const len=frac*C;
    s+=`<circle cx="60" cy="60" r="${R}" fill="none" stroke="${col}" stroke-width="13"
         stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}"
         transform="rotate(-90 60 60)" opacity="0.92"/>`;
    off+=len;
  }
  document.getElementById('donut').innerHTML=`<circle cx="60" cy="60" r="48" fill="none" stroke="#0b1521" stroke-width="13"/>`+s;
  const lbl={fix_first:'Fix first',schedule:'Schedule',monitor:'Monitor',accept:'Accept'};
  document.getElementById('dlegend').innerHTML=order.map(([k,col])=>
    `<div class="row"><i style="background:${col}"></i>${lbl[k]}<b>${bands[k]||0}</b></div>`).join('');
}

function renderVendors(){
  const cnt={};
  for(const r of DATA.results){const v=r.asset.vendor.split(' ')[0];cnt[v]=(cnt[v]||0)+1;}
  const rows=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max=Math.max(...rows.map(r=>r[1]),1);
  document.getElementById('vbars').innerHTML=rows.map(([v,c])=>
    `<div class="hbar"><div class="t">${v}<b>${c}</b></div><div class="track"><span data-w="${c/max*100}"></span></div></div>`).join('');
  requestAnimationFrame(()=>document.querySelectorAll('#vbars .track>span').forEach(s=>s.style.width=s.dataset.w+'%'));
}

function renderQuad(){
  const bandRank={fix_first:0,schedule:1,monitor:2,accept:3};
  const g={};
  for(const r of DATA.results){const k=r.vuln.cve;
    if(!g[k])g[k]={cve:k,cvss:r.vuln.cvss,epss:r.factors.epss_pct,kev:r.vuln.kev,title:r.vuln.title,assets:new Set(),band:r.band};
    g[k].assets.add(r.asset.id); if(bandRank[r.band]<bandRank[g[k].band])g[k].band=r.band;}
  const items=Object.values(g);
  let s=`<defs>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="fz" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff5740" stop-opacity="0.18"/><stop offset="1" stop-color="#ff5740" stop-opacity="0.02"/></linearGradient></defs>`;
  const zx=xS(50), zy=yS(10), zyb=yS(7);
  s+=`<rect x="${M.l}" y="${M.t}" width="${VW-M.l-M.r}" height="${VH-M.t-M.b}" fill="rgba(9,14,22,.4)" stroke="#16202e"/>`;
  s+=`<rect x="${zx}" y="${zy}" width="${VW-M.r-zx}" height="${zyb-zy}" fill="url(#fz)"/>`;
  s+=`<text x="${VW-M.r-8}" y="${zy+16}" text-anchor="end" fill="#ff7a68" font-size="10" font-family="var(--disp)" letter-spacing="2">FIX FIRST ZONE</text>`;
  for(let c=0;c<=10;c+=2){const y=yS(c);s+=`<line x1="${M.l}" y1="${y}" x2="${VW-M.r}" y2="${y}" stroke="#101a26"/><text x="${M.l-7}" y="${y+3}" text-anchor="end" fill="#3b4a5e" font-size="8">${c}</text>`;}
  for(const e of [1,10,50,90]){const x=xS(e);s+=`<line x1="${x}" y1="${M.t}" x2="${x}" y2="${VH-M.b}" stroke="#101a26"/><text x="${x}" y="${VH-M.b+14}" text-anchor="middle" fill="#3b4a5e" font-size="8">${e}%</text>`;}
  s+=`<line x1="${zx}" y1="${M.t}" x2="${zx}" y2="${VH-M.b}" stroke="#2a3a4c" stroke-dasharray="3 4"/><line x1="${M.l}" y1="${zyb}" x2="${VW-M.r}" y2="${zyb}" stroke="#2a3a4c" stroke-dasharray="3 4"/>`;
  s+=`<text x="${(M.l+VW-M.r)/2}" y="${VH-6}" text-anchor="middle" fill="#65788f" font-size="9" font-family="var(--disp)" letter-spacing="1">EXPLOIT LIKELIHOOD — EPSS</text>`;
  s+=`<text transform="translate(14,${(M.t+VH-M.b)/2}) rotate(-90)" text-anchor="middle" fill="#65788f" font-size="9" font-family="var(--disp)" letter-spacing="1">SEVERITY — CVSS</text>`;
  items.sort((a,b)=>bandRank[b.band]-bandRank[a.band]);
  items.forEach((it,i)=>{const cx=xS(it.epss),cy=yS(it.cvss),r=6+Math.min(4,it.assets.size)*2.3,col=BAND_COLOR[it.band],d=(i*0.05).toFixed(2);
    if(it.kev)s+=`<circle cx="${cx}" cy="${cy}" r="${r+3}" fill="none" stroke="${col}" stroke-opacity="0.5" filter="url(#glow)"><animate attributeName="r" values="${r+2};${r+7};${r+2}" dur="2.4s" repeatCount="indefinite"/><animate attributeName="stroke-opacity" values="0.55;0.1;0.55" dur="2.4s" repeatCount="indefinite"/></circle>`;
    s+=`<circle class="bub" data-cve="${it.cve}" data-title="${it.title}" data-a="${it.assets.size}" data-e="${it.epss}" data-c="${it.cvss}" data-kev="${it.kev}" cx="${cx}" cy="${cy}" r="0" fill="${col}" fill-opacity="0.85" stroke="#0a0f18"><animate attributeName="r" from="0" to="${r}" dur="0.5s" begin="${d}s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></circle>`;});
  const svg=document.getElementById('quad'); svg.innerHTML=s;
  const tip=document.getElementById('tip'),wrap=svg.parentElement;
  svg.querySelectorAll('.bub').forEach(b=>{
    b.addEventListener('mousemove',ev=>{const rc=wrap.getBoundingClientRect();tip.style.left=(ev.clientX-rc.left+12)+'px';tip.style.top=(ev.clientY-rc.top+12)+'px';tip.style.opacity=1;
      tip.innerHTML=`<div class="t">${b.dataset.cve}${b.dataset.kev==='true'?' · KEV':''}</div><div class="d">${b.dataset.title}<br>CVSS ${b.dataset.c} · EPSS ${b.dataset.e}% · ${b.dataset.a} asset(s)</div>`;});
    b.addEventListener('mouseleave',()=>tip.style.opacity=0);});
}

function renderExposure(){
  const lv={}; for(const r of DATA.results){const l=r.asset.purdue_level;if(!lv[l])lv[l]={n:0,fix:0};lv[l].n++;if(r.band==='fix_first')lv[l].fix++;}
  const levels=[0,1,2,3,4,5]; const max=Math.max(...levels.map(l=>(lv[l]||{n:0}).n),1);
  document.getElementById('exbars').innerHTML=levels.map(l=>{const d=lv[l]||{n:0,fix:0};const h=d.n/max*100;
    return `<div class="ex"><div class="n">${d.n}</div><div class="bar ${d.fix?'hot':''}" data-h="${h}" style="height:0"></div><div class="l">L${l}</div></div>`;}).join('');
  requestAnimationFrame(()=>document.querySelectorAll('#exbars .bar').forEach(b=>b.style.height=b.dataset.h+'%'));
}

function renderQueue(){
  const box=document.getElementById('queue');
  box.innerHTML=DATA.results.slice(0,20).map((r,i)=>
    `<div class="qitem b-${r.band}"><div class="top"><span class="rk">${String(i+1).padStart(2,'0')}</span>`+
    `<span class="cve">${r.vuln.cve}</span>${r.vuln.kev?`<span class="kev">exploited</span>`:``}`+
    `<span class="p">${r.priority}</span></div>`+
    `<div class="m"><b>${r.asset.id}</b> · ${r.asset.vendor.split(' ')[0]} ${r.asset.model} · CVSS ${r.vuln.cvss} · EPSS ${Math.round(r.factors.epss_pct)}%</div>`+
    `<div class="bar"><span data-w="${r.priority}"></span></div></div>`).join('');
  requestAnimationFrame(()=>document.querySelectorAll('#queue .bar>span').forEach(s=>s.style.width=Math.min(100,+s.dataset.w)+'%'));
}

function renderTicker(){
  const segs=DATA.results.slice(0,14).map(r=>
    `<span class="seg">${r.vuln.kev?'<b>▲ EXPLOITED</b> · ':''}<span class="cve">${r.vuln.cve}</span> · ${r.asset.id} · P${r.priority} · ${r.action.split(/[—.]/)[0]}</span>`).join('');
  document.getElementById('ticker').innerHTML=segs+segs;
}

load();
</script>
</body>
</html>
